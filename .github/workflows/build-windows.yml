name: build-windows

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_call:

jobs:
  windows-wheels:
    runs-on: windows-latest
    strategy:
      matrix:
        version: [ "3.10", "3.11", "3.12", "3.13", "3.14" ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.version }}

      - name: Add LLVM to PATH
        run: echo "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: C:/vcpkg/installed
          key: vcpkg-windows-${{ hashFiles('ports/**') }}
          restore-keys: vcpkg-windows-

      - name: Install dependencies via vcpkg
        env:
          VCPKG_ROOT: C:/vcpkg
        run: |
          vcpkg install operon `
            --overlay-ports="${{ github.workspace }}/ports" `
            --triplet=x64-windows-static

      - name: Build wheel
        env:
          VCPKG_ROOT: C:/vcpkg
          SKBUILD_CMAKE_ARGS: --preset=build-windows
        run: |
          pip install nanobind scikit-build-core delvewheel
          pip wheel . -w dist/ --no-build-isolation --no-deps

      - name: Repair wheel
        run: delvewheel repair dist/*.whl -w wheelhouse/

      - name: Upload wheel
        uses: actions/upload-artifact@v5
        with:
          name: wheels-windows-${{ matrix.version }}
          path: wheelhouse/
          retention-days: 90
