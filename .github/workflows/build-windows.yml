name: build-windows

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_call:

jobs:
  test:
    uses: ./.github/workflows/test.yml

  windows-wheels:
    needs: [test]
    runs-on: windows-latest
    strategy:
      matrix:
        version: [ "3.10", "3.11", "3.12", "3.13", "3.14" ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.version }}

      - name: Add LLVM to PATH
        run: echo "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Update vcpkg
        run: git -C C:/vcpkg fetch origin && git -C C:/vcpkg reset --hard origin/master

      - name: Cache vcpkg downloads
        uses: actions/cache@v4
        with:
          path: C:/vcpkg/downloads
          key: vcpkg-downloads-windows-${{ hashFiles('ports/**', 'triplets/**', 'vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: vcpkg-downloads-windows-

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: C:/vcpkg/installed
          key: vcpkg-windows-${{ hashFiles('ports/**', 'triplets/**', 'vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: vcpkg-windows-

      - name: Build wheel
        env:
          VCPKG_ROOT: C:/vcpkg
          SKBUILD_CMAKE_ARGS: --preset=build-windows
          # MSVC's parallel build daemon (mspdbsrv.exe) can keep a handle open
          # on the CMake build tree after the build finishes. When that tree
          # lives inside scikit-build-core's auto-cleaned staging tempdir, the
          # wheel-build's own TemporaryDirectory cleanup then intermittently
          # fails with WinError 32/5 (used-by-another-process / access denied)
          # trying to rmtree it. Pointing build-dir at a stable, non-temp path
          # takes that directory out of the auto-cleanup path entirely.
          SKBUILD_BUILD_DIR: build
        run: |
          pip install nanobind scikit-build-core delvewheel
          pip wheel . -w dist/ --no-build-isolation --no-deps

      - name: Repair wheel
        # infix-parser is force-built as a shared DLL regardless of the vcpkg
        # triplet (see ports/operon/../infix-parser in the registry), so
        # delvewheel needs the vcpkg triplet's bin dir on its search path to
        # find it.
        run: delvewheel repair dist/*.whl -w wheelhouse/ --add-path C:/vcpkg/installed/x64-windows-static-clang/bin

      - name: Upload wheel
        uses: actions/upload-artifact@v5
        with:
          name: wheels-windows-${{ matrix.version }}
          path: wheelhouse/
          retention-days: 90
